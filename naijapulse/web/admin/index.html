<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=./login">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaijaPulse Admin</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b4f38 0%, #0f6b4b 100%);
      color: #ffffff;
      font-family: Inter, Arial, sans-serif;
    }

    .card {
      max-width: 420px;
      padding: 28px 32px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.88);
    }

    a {
      color: #ffffff;
      font-weight: 700;
    }
  </style>
  <script>
    window.addEventListener('load', function () {
      window.location.replace('./login');
    });
  </script>
</head>
<body>
  <div class="card">
    <h1>NaijaPulse Admin</h1>
    <p>Redirecting to the editorial dashboard sign-in.</p>
    <p>If nothing happens, <a href="./login">open the admin login</a>.</p>
  </div>
</body>
</html>
