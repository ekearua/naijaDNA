<svg width="1080" height="2340" viewBox="0 0 1080 2340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="2340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F7F5"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E3D2D"/>
      <stop offset="1" stop-color="#1F6A4E"/>
    </linearGradient>
    <linearGradient id="heroOverlay" x1="0" y1="280" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00000000"/>
      <stop offset="1" stop-color="#000000B0"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1080" height="2340" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#052214" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1080" height="2340" fill="url(#bg)"/>

  <!-- Hero media -->
  <rect x="0" y="0" width="1080" height="560" fill="url(#hero)"/>
