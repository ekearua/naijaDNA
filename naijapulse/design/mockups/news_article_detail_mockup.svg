  <text x="570" y="700" text-anchor="middle" fill="#FFFFFF" font-size="28" font-family="Inter, Arial" font-weight="700">Listen</text>

  <!-- Quick facts card -->
  <rect x="52" y="760" width="976" height="228" rx="24" fill="#F7FAF8" stroke="#E2E8F0"/>
  <text x="84" y="822" fill="#0F1C17" font-size="32" font-family="Inter, Arial" font-weight="800">At a Glance</text>
  <text x="84" y="874" fill="#334155" font-size="28" font-family="Inter, Arial">• Protest began early morning around Ikeja axis.</text>
  <text x="84" y="922" fill="#334155" font-size="28" font-family="Inter, Arial">• Police deployed crowd control by mid-day.</text>
  <text x="84" y="970" fill="#334155" font-size="28" font-family="Inter, Arial">• Civil groups demand talks and de-escalation.</text>

  <!-- Story body -->
  <text x="52" y="1068" fill="#111827" font-size="34" font-family="Inter, Arial" font-weight="700">Story</text>
  <text x="52" y="1122" fill="#1F2937" font-size="30" font-family="Inter, Arial">Residents in multiple parts of Lagos reported disruptions</text>
  <text x="52" y="1168" fill="#1F2937" font-size="30" font-family="Inter, Arial">as traffic was diverted and commercial activity slowed.</text>
  <text x="52" y="1214" fill="#1F2937" font-size="30" font-family="Inter, Arial">Officials said an emergency meeting is expected later today.</text>

  <rect x="52" y="1250" width="976" height="172" rx="22" fill="#F8FAFC" stroke="#E5E7EB"/>
  <text x="84" y="1322" fill="#0A7F4F" font-size="30" font-family="Merriweather, Georgia" font-weight="700">"We need calm dialogue and clear communication,"</text>
  <text x="84" y="1370" fill="#0A7F4F" font-size="30" font-family="Merriweather, Georgia" font-weight="700">a transport union leader told NaijaPulse.</text>

  <text x="52" y="1496" fill="#1F2937" font-size="30" font-family="Inter, Arial">Witnesses shared videos showing roadblocks and heavy</text>
  <text x="52" y="1542" fill="#1F2937" font-size="30" font-family="Inter, Arial">security presence. Emergency responders remained on standby.</text>
  <text x="52" y="1588" fill="#1F2937" font-size="30" font-family="Inter, Arial">Further updates are expected during evening briefings.</text>

  <!-- Related -->
  <text x="52" y="1686" fill="#111827" font-size="34" font-family="Inter, Arial" font-weight="700">Related stories</text>

  <rect x="52" y="1720" width="976" height="126" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="72" y="1740" width="136" height="86" rx="12" fill="#DDE8E3"/>
  <text x="228" y="1788" fill="#0F172A" font-size="28" font-family="Inter, Arial" font-weight="600">INEC issues new polling center guidance</text>
