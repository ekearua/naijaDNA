  <rect x="36" y="104" width="72" height="72" rx="36" fill="#FFFFFF22"/>
  <path d="M80 140H64" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M64 140L76 128" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M64 140L76 152" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="902" y="104" width="72" height="72" rx="36" fill="#FFFFFF22"/>
  <path d="M938 132V152" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M929 140H947" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <rect x="44" y="404" width="166" height="52" rx="26" fill="#D32F2F"/>
  <text x="127" y="438" text-anchor="middle" fill="#FFFFFF" font-size="28" font-family="Inter, Arial" font-weight="700">BREAKING</text>

  <text x="44" y="490" fill="#FFFFFF" font-size="54" font-family="Merriweather, Georgia" font-weight="800">Lagos protest update:</text>
  <text x="44" y="552" fill="#FFFFFF" font-size="54" font-family="Merriweather, Georgia" font-weight="800">What happened and what’s next</text>

  <!-- Floating article sheet -->
  <g filter="url(#shadow)">
    <rect x="28" y="516" width="1024" height="1704" rx="42" fill="#FFFFFF"/>
  </g>

  <!-- Metadata row -->
  <circle cx="86" cy="608" r="18" fill="#0A7F4F"/>
  <text x="122" y="618" fill="#0F1C17" font-size="30" font-family="Inter, Arial" font-weight="700">Channels TV</text>
  <text x="330" y="618" fill="#6B7280" font-size="28" font-family="Inter, Arial">• 15m ago</text>
  <rect x="780" y="578" width="228" height="56" rx="28" fill="#EAF4EE"/>
  <text x="894" y="614" text-anchor="middle" fill="#0A7F4F" font-size="26" font-family="Inter, Arial" font-weight="700">Fact-Checked</text>

  <!-- Action pills -->
  <rect x="52" y="656" width="180" height="68" rx="34" fill="#F3F4F6"/>
  <text x="142" y="700" text-anchor="middle" fill="#1F2937" font-size="28" font-family="Inter, Arial" font-weight="600">Save</text>
  <rect x="248" y="656" width="214" height="68" rx="34" fill="#F3F4F6"/>
  <text x="355" y="700" text-anchor="middle" fill="#1F2937" font-size="28" font-family="Inter, Arial" font-weight="600">Discuss</text>
